<!DOCTYPE html>
<html lang="en">

<head>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">


    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Decision Maker - Snacks</title>
</head>

<body>
    <style>
        body {
            font-family: Roboto;
        }


        .button-link {
            background-color: rgb(89, 209, 89);
            color: white;
            padding: 10px;
            border-radius: 20px;
            text-decoration: none;
            display: block;
            width: 200px;
            margin: 0 auto;
            text-align: center;
            transition: 300ms;

        }

        .button-link:hover {
            background-color: rgb(89, 209, 89);
            color: white;
            padding: 10px;
            border-radius: 20px;
            text-decoration: none;
            display: block;
            width: 200px;
            margin: 0 auto;
            text-align: center;
            opacity: 0.8;
        }
    </style>


    <h1 style="text-align: center;">Decision Maker - Snacks</h1>

    <p style="text-align: center;">Decide a snack!</p>

    <button class="button-link"
        onclick="alert(['Chips', 'Granola Bar', 'Cookies', 'Cheese', 'Watermelon', 'Strawberries', 'BlueBerries', 'Ice Cream', '5-7 gummies of your choice to stay healthy!', 'Fruit Snacks', 'Pretzels', 'DEEZ NUTZ or just nuts, I guess!', 'Yogurt', 'Marshmallows'][Math.floor(Math.random() * 14)])">Roll</button>
    <a href="start.html" class="button-link">Back</a>

























</body>

</html>
